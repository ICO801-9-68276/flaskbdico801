{% extends "layout.html" %} {% block container %}

<div class="py-32 relative overflow-x-auto sm:rounded-lg">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="max-w-md mx-auto mb-4">
        {% for message in messages %}
          <div class="p-4 mb-3 text-sm text-red-800 rounded-lg bg-red-50 border border-red-200" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form action="" method="POST" novalidate class="max-w-md mx-auto">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Alumno</label>
      <select name="alumno_id" class="block w-full p-2.5 border border-gray-300 rounded-lg" required>
        <option value="">Seleccione un alumno</option>
        {% for alumno in alumnos %}
          <option value="{{ alumno.id }}" {% if alumno_id|string == alumno.id|string %}selected{% endif %}>
            {{ alumno.nombre }} {{ alumno.apaterno }} {{ alumno.amaterno }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Curso</label>
      <select name="curso_id" class="block w-full p-2.5 border border-gray-300 rounded-lg" required>
        <option value="">Seleccione un curso</option>
        {% for curso in cursos %}
          <option value="{{ curso.id }}" {% if curso_id|string == curso.id|string %}selected{% endif %}>
            {{ curso.nombre }} - {{ curso.maestro.nombre }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="grid md:grid-cols-2 md:gap-6">
      <input
        type="submit"
        value="Registrar"
        class="text-white bg-blue-700 hover:bg-blue-800 rounded-lg text-sm px-5 py-2.5 text-center"
      />
      <a href="{{ url_for('inscripciones.inscripciones') }}"
         class="bg-green-500 text-white px-4 py-2 rounded flex items-center justify-center hover:bg-green-600">
        Cancelar
      </a>
    </div>
  </form>
</div>

{% endblock %}

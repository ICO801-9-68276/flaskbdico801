{% extends "layout.html" %}

{% block container %}
<div class="bg-white shadow-lg rounded-2xl p-10 text-center">
    <h1 class="text-4xl font-bold text-blue-700 mb-4">Bienvenido al Sistema Escolar</h1>
    <p class="text-gray-700 text-lg mb-6">
        Desde la barra de navegación puedes administrar alumnos, maestros, cursos,
        realizar inscripciones y ejecutar las consultas solicitadas.
    </p>

    <div class="grid md:grid-cols-3 gap-4 mt-8">
        <a href="{{ url_for('alumnos') }}" class="bg-blue-600 text-white p-4 rounded-xl hover:bg-blue-700">Ir a Alumnos</a>
        <a href="{{ url_for('maestros') }}" class="bg-green-600 text-white p-4 rounded-xl hover:bg-green-700">Ir a Maestros</a>
        <a href="{{ url_for('cursos') }}" class="bg-purple-600 text-white p-4 rounded-xl hover:bg-purple-700">Ir a Cursos</a>
    </div>
</div>
{% endblock %}

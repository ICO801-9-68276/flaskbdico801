{% extends "layout.html" %} {% block container %}

<div class="py-32 relative overflow-x-auto sm:rounded-lg">
  <a
    href="{{ url_for('alumnos') }}"
    class="bg-green-500 text-white px-4 py-2 rounded flex items-center gap-2 hover:bg-green-600"
  >
    <svg
      class="w-6 h-6 text-white-800 dark:text-white"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      fill="none"
      viewBox="0 0 24 24"
    >
      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
      />
    </svg>
    Nuevo
  </a>

  <table
    class="py-2 w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400"
  >
    <thead
      class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400"
    >
      <tr>
        <th scope="col" class="px-6 py-3">Nombre</th>
        <th scope="col" class="px-6 py-3"><div class="flex items-center">Apaterno</div></th>
        <th scope="col" class="px-6 py-3"><div class="flex items-center">Amaterno</div></th>
        <th scope="col" class="px-6 py-3"><div class="flex items-center">Edad</div></th>
        <th scope="col" class="px-6 py-3"><div class="flex items-center">Correo</div></th>
        <th scope="col" class="px-6 py-3"><div class="flex items-center">Editar</div></th>
        <th scope="col" class="px-6 py-3"><div class="flex items-center">Detalles</div></th>
        <th scope="col" class="px-6 py-3"><div class="flex items-center">Eliminar</div></th>
      </tr>
    </thead>
    <tbody>
      {% for alum in alumno %}
      <tr
        class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200"
      >
        <th
          scope="row"
          class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white"
        >
          {{ alum.nombre }}
        </th>
        <td class="px-6 py-4">{{ alum.apaterno }}</td>
        <td class="px-6 py-4">{{ alum.amaterno }}</td>
        <td class="px-6 py-4">{{ alum.edad }}</td>
        <td class="px-6 py-4">{{ alum.email }}</td>
        <td class="px-6 py-4 text-right">
          <a
            href="{{ url_for('modificar', id=alum.id) }}"
            class="flex items-center gap-2 bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600"
          >
            Editar
          </a>
        </td>
        <td class="px-6 py-4 text-right">
          <a
            href="{{ url_for('detalles', id=alum.id) }}"
            class="flex items-center gap-2 bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600"
          >
            Detalles
          </a>
        </td>
        <td class="px-6 py-4 text-right">
          <a
            href="{{ url_for('eliminar', id=alum.id) }}"
            class="flex items-center gap-2 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
          >
            Eliminar
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}

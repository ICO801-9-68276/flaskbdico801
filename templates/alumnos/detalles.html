{% extends "layout.html" %} {% block container %}
<div class="group py-32 relative overflow-x-auto sm:rounded-lg">
  <div class="relative bg-white max-w-xs w-full p-6 border border-gray-200 rounded-lg shadow-xs mx-auto">
    <div class="flex flex-col items-center">
      <img
        class="w-24 h-24 mb-6 rounded-full"
        src="{{url_for('static',filename='img/usuario.png')}}"
        alt="usuario"
      />
      <h5 class="mb-2 text-xl font-semibold tracking-tight text-gray-900">
        Nombre: {{nombre}} {{apaterno}} {{amaterno}}
      </h5>
      <h3 class="mb-2 text-lg tracking-tight text-gray-900">
        Correo: {{email}}
      </h3>
      <h3 class="mb-2 text-lg tracking-tight text-gray-900">
        Edad: {{edad}}
      </h3>

      <div class="flex mt-4 md:mt-6 gap-4">
        <a href="{{ url_for('alumnos.alumnos') }}"
           class="bg-green-500 text-white px-4 py-2 rounded flex items-center gap-2 hover:bg-green-600">
          <svg class="w-6 h-6 text-white-800" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
               width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          </svg>
          Regresar
        </a>
      </div>
    </div>
  </div>
</div>
{%endblock%}

{% extends "layout.html" %} {% block container %}

<div class="py-32">
  <div class="max-w-xl mx-auto bg-white border border-gray-200 rounded-lg shadow p-8">
    <h2 class="text-2xl font-bold mb-4">Detalles del curso</h2>

    <p class="mb-3"><strong>ID:</strong> {{ curso.id }}</p>
    <p class="mb-3"><strong>Nombre:</strong> {{ curso.nombre }}</p>
    <p class="mb-3"><strong>Descripción:</strong> {{ curso.descripcion }}</p>
    <p class="mb-3"><strong>Maestro:</strong> {{ curso.maestro.nombre }} {{ curso.maestro.apellidos }}</p>

    <a href="{{ url_for('cursos.cursos') }}"
       class="inline-block mt-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
      Regresar
    </a>
  </div>
</div>

{% endblock %}

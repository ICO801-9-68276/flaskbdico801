{% extends "layout.html" %} {% block container %}

<div class="py-32 relative overflow-x-auto sm:rounded-lg">

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="max-w-md mx-auto mb-4">
        {% for message in messages %}
          <div class="p-4 mb-3 text-sm text-red-800 rounded-lg bg-red-50 border border-red-200" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form action="" method="POST" novalidate class="max-w-md mx-auto">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Nombre del curso</label>
      <input type="text" value="{{ curso.nombre }}" class="block w-full p-2.5 border border-gray-300 rounded-lg" readonly>
    </div>

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Descripción</label>
      <textarea class="block w-full p-2.5 border border-gray-300 rounded-lg" readonly>{{ curso.descripcion }}</textarea>
    </div>

    <div class="mb-5">
      <label class="block mb-2 text-sm font-medium text-gray-900">Maestro</label>
      <input type="text" value="{{ curso.maestro.nombre }} {{ curso.maestro.apellidos }}"
             class="block w-full p-2.5 border border-gray-300 rounded-lg" readonly>
    </div>

    <div class="grid md:grid-cols-2 md:gap-6">
      <input
        type="submit"
        value="Eliminar"
        class="text-white bg-blue-700 hover:bg-blue-800 rounded-lg text-sm px-5 py-2.5 text-center cursor-pointer"
      />
      <a href="{{ url_for('cursos.cursos') }}"
         class="bg-green-500 text-white px-4 py-2 rounded flex items-center justify-center hover:bg-green-600">
        Cancelar
      </a>
    </div>
  </form>
</div>

{% endblock %}

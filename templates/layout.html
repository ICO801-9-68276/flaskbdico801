<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universidad de León | Plataforma Académica</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

<nav class="bg-white/85 backdrop-blur-md fixed w-full z-50 top-0 start-0 border-b border-gray-200 shadow-sm transition-all">
  <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">

    <a href="{{ url_for('alumnos.inicio') }}" class="flex items-center group hover:opacity-95 transition-opacity" style="gap: 35px;">
      <img
        src="{{ url_for('static', filename='img/UDL_LogotipoNegro.png') }}"
        alt="Logo Universidad de León"
        style="height: 70px; width: auto;"
        class="object-contain transform group-hover:scale-105 transition duration-300"
      >
      <div class="flex flex-col justify-center">
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight leading-none mb-1">
          Universidad de León
        </h1>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest">
          Plataforma Académica
        </p>
      </div>
    </a>

    <ul class="flex items-center gap-10 text-base font-medium text-gray-600">
      <li>
        <a href="{{ url_for('alumnos.inicio') }}"
           class="hover:text-blue-700 transition-all duration-200 px-5 py-2.5 rounded-full hover:bg-blue-50">
          Inicio
        </a>
      </li>
      <li>
        <a href="{{ url_for('alumnos.alumnos') }}"
           class="hover:text-blue-700 transition-all duration-200 px-5 py-2.5 rounded-full hover:bg-blue-50">
          Alumnos
        </a>
      </li>
      <li>
        <a href="{{ url_for('maestros.maestros') }}"
           class="hover:text-blue-700 transition-all duration-200 px-5 py-2.5 rounded-full hover:bg-blue-50">
          Maestros
        </a>
      </li>
    </ul>

  </div>
</nav>

<div class="pt-32"></div>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="max-w-4xl mx-auto px-6 mb-8">
      {% for message in messages %}
        <div class="p-4 flex items-center gap-3 text-sm text-red-800 rounded-xl bg-red-50/90 border border-red-100 shadow-sm" role="alert">
          <svg class="w-5 h-5 text-red-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
          </svg>
          <span class="font-medium">{{ message }}</span>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<main class="max-w-7xl mx-auto px-8 pb-12">
    {% block container %}
    {% endblock %}
</main>

<script src="{{ url_for('static', filename='node_modules/flowbite/dist/flowbite.min.js') }}"></script>
</body>
</html>
